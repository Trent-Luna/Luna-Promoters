<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Luna Promoters — Page Mockups</title>
<style>
  :root{
    --bg:#0a0a0f; --surface:#12121a; --card:#1a1a24; --border:#2a2a38;
    --text:#f5f5f7; --muted:#9a9aa8; --gold:#d4af37; --goldsoft:#e8d48a;
    --accent:#d4af37; --accent2:#e8d48a;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:Inter,system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);
    background:radial-gradient(1200px 600px at 50% -10%, #1b1330 0%, #0a0a0f 55%) no-repeat #0a0a0f;}
  a{color:inherit}
  .app{display:flex;min-height:100vh}
  /* sidebar */
  .side{width:250px;flex:none;border-right:1px solid var(--border);padding:18px 14px;position:sticky;top:0;height:100vh;overflow:auto;background:#0c0c12}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .brand .mark{width:30px;height:30px;border:2px solid var(--gold);border-radius:50%;position:relative}
  .brand .mark:after{content:"";position:absolute;inset:5px;border-radius:50%;background:var(--gold);clip-path:inset(0 0 0 40%)}
  .brand b{font-weight:800;letter-spacing:-.02em}
  .brand small{display:block;font-size:9px;letter-spacing:.3em;color:var(--gold);margin-top:-2px}
  .side h4{font-size:10px;text-transform:uppercase;letter-spacing:.15em;color:var(--muted);margin:18px 0 6px}
  .navbtn{display:block;width:100%;text-align:left;background:none;border:0;color:var(--muted);padding:8px 10px;border-radius:9px;font-size:13.5px;cursor:pointer;font-family:inherit}
  .navbtn:hover{color:var(--text);background:#15151f}
  .navbtn.active{background:rgba(212,175,55,.14);color:var(--gold);font-weight:600}
  .theme-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
  .chip{border:1px solid var(--border);border-radius:999px;padding:5px 9px;font-size:11px;cursor:pointer;color:var(--muted);background:none;font-family:inherit}
  .chip.on{border-color:var(--accent);color:var(--accent);background:rgba(212,175,55,.1)}
  /* stage */
  .stage{flex:1;padding:26px;overflow:auto}
  .frame-label{font-size:12px;color:var(--muted);margin-bottom:12px}
  .device{max-width:460px;margin:0 auto;border:1px solid var(--border);border-radius:26px;padding:14px;background:#0b0b11}
  .device.wide{max-width:1000px;border-radius:18px}
  .device.ipad{max-width:820px;border-radius:22px}
  /* ui atoms */
  .card{background:var(--card);border:1px solid var(--border);border-radius:18px}
  .pad{padding:22px}
  .pill{display:inline-flex;align-items:center;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700}
  .label{display:block;font-size:12px;color:var(--muted);margin:0 0 5px}
  .input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:11px 13px;color:var(--text);font-size:14px;font-family:inherit}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:0;border-radius:12px;padding:12px 18px;font-weight:700;cursor:pointer;font-family:inherit;font-size:14px}
  .btn-accent{background:linear-gradient(180deg,var(--accent2),var(--accent));color:#111;box-shadow:0 0 34px rgba(212,175,55,.22)}
  .btn-ghost{background:var(--surface);border:1px solid var(--border);color:var(--text)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px}
  .stat .n{font-size:26px;font-weight:800}
  .stat .l{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-top:3px}
  .muted{color:var(--muted)}
  .accent{color:var(--accent)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:9px;border-bottom:1px solid var(--border)}
  td{padding:9px;border-bottom:1px solid rgba(42,42,56,.5)}
  .qr{width:150px;height:150px;background:#fff;border-radius:12px;padding:8px}
  .qr svg{width:100%;height:100%}
  .venue-logo{font-family:Inter;font-weight:800;letter-spacing:.02em;font-size:22px}
  .screen{display:none}
  .screen.show{display:block}
  .hd{font-size:26px;font-weight:800;letter-spacing:-.02em;margin:0 0 4px}
  .note{max-width:1000px;margin:0 auto 16px;font-size:12.5px;color:var(--muted);background:#12121a;border:1px solid var(--border);border-radius:12px;padding:10px 14px}
  /* tier bar */
  .track{height:14px;border-radius:999px;background:var(--surface);overflow:hidden}
  .track > i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,#cd7f32,#c0c0c0,#d4af37)}
  .miles{position:relative;height:44px;margin-top:8px}
  .mile{position:absolute;transform:translateX(-50%);text-align:center}
  .mile .dot{width:12px;height:12px;border-radius:50%;margin:0 auto;border:2px solid}
  .mile b{display:block;font-size:11px;margin-top:4px;text-transform:capitalize}
  .mile small{font-size:9px;color:var(--muted)}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand"><div class="mark"></div><div><b>LUNA GROUP</b><small>PROMOTERS</small></div></div>
    <div style="font-size:11px;color:var(--muted);margin:8px 0 4px">Venue theme (guest pages)</div>
    <div class="theme-row" id="themes">
      <button class="chip on" data-a="#d4af37" data-b="#e8d48a" data-v="Eclipse">Eclipse</button>
      <button class="chip" data-a="#e5484d" data-b="#ff6b6b" data-v="AfterDark">AfterDark</button>
      <button class="chip" data-a="#ef6f53" data-b="#ffa07a" data-v="Su Casa BNE">Su Casa</button>
      <button class="chip" data-a="#d6249f" data-b="#ff5fb0" data-v="Pump">Pump</button>
    </div>

    <h4>Public / guest</h4>
    <button class="navbtn active" data-s="signup">Promoter sign-up</button>
    <button class="navbtn" data-s="success">Application success</button>
    <button class="navbtn" data-s="register">Guest registration /p/</button>
    <button class="navbtn" data-s="qr">Guest QR /g/</button>
    <button class="navbtn" data-s="login">Login</button>

    <h4>Staff</h4>
    <button class="navbtn" data-s="reception">Reception check-in (iPad)</button>

    <h4>Promoter</h4>
    <button class="navbtn" data-s="promoter">Promoter dashboard</button>

    <h4>Admin</h4>
    <button class="navbtn" data-s="admin">Admin overview</button>
    <button class="navbtn" data-s="approvals">Promoter approvals</button>
    <button class="navbtn" data-s="events">Events</button>
    <button class="navbtn" data-s="leaderboard">Leaderboards</button>
    <button class="navbtn" data-s="tiers">Tier settings</button>
    <button class="navbtn" data-s="exports">CSV exports</button>

    <h4>Venue manager</h4>
    <button class="navbtn" data-s="venue">Venue dashboard</button>
  </aside>

  <main class="stage" id="stage"></main>
</div>

<script>
const QR = `<svg viewBox="0 0 100 100"><rect width="100" height="100" fill="#fff"/><g fill="#0a0a0f">
<rect x="8" y="8" width="24" height="24"/><rect x="14" y="14" width="12" height="12" fill="#fff"/>
<rect x="68" y="8" width="24" height="24"/><rect x="74" y="14" width="12" height="12" fill="#fff"/>
<rect x="8" y="68" width="24" height="24"/><rect x="14" y="74" width="12" height="12" fill="#fff"/>
<rect x="40" y="10" width="6" height="6"/><rect x="52" y="10" width="6" height="6"/><rect x="40" y="22" width="6" height="6"/>
<rect x="60" y="40" width="6" height="6"/><rect x="72" y="46" width="6" height="6"/><rect x="84" y="40" width="6" height="6"/>
<rect x="40" y="40" width="6" height="6"/><rect x="46" y="52" width="6" height="6"/><rect x="40" y="64" width="6" height="6"/>
<rect x="52" y="70" width="6" height="6"/><rect x="64" y="76" width="6" height="6"/><rect x="76" y="70" width="6" height="6"/>
<rect x="84" y="82" width="6" height="6"/><rect x="70" y="88" width="6" height="6"/><rect x="88" y="60" width="4" height="4"/></g></svg>`;

const logo = `<div style="display:flex;align-items:center;gap:9px"><div style="width:26px;height:26px;border:2px solid var(--gold);border-radius:50%;position:relative"><span style="position:absolute;inset:5px;border-radius:50%;background:var(--gold);clip-path:inset(0 0 0 40%);display:block"></span></div><div style="line-height:1"><b style="font-weight:800">LUNA GROUP</b><br><small style="font-size:8px;letter-spacing:.28em;color:var(--gold)">PROMOTERS</small></div></div>`;

let VENUE = 'Eclipse';

const screens = {
signup: () => `
<div class="frame-label">Public landing · promoter.lunagroup.com.au</div>
<div class="device">
  <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 4px 16px">${logo}<span class="muted" style="font-size:13px">Login</span></div>
  <div style="text-align:center;padding:0 6px 16px">
    <span class="pill" style="background:rgba(212,175,55,.12);color:var(--gold)">Now accepting applications</span>
    <h1 class="hd" style="margin-top:12px">Become a Luna Group promoter</h1>
    <p class="muted" style="font-size:14px">Bring the crowd to Eclipse, Eclipse AfterDark, Su Casa Brisbane and Pump Nightclub. Climb the leaderboard, unlock tiers, earn real rewards.</p>
  </div>
  <div class="card pad">
    <b>Promoter application</b><p class="muted" style="font-size:12.5px;margin:4px 0 14px">Reviewed by the Luna team. You must be 18 or older.</p>
    <div class="grid2">
      <div style="grid-column:1/3"><span class="label">Full name *</span><div class="input"></div></div>
      <div><span class="label">Mobile *</span><div class="input"></div></div>
      <div><span class="label">Email *</span><div class="input"></div></div>
      <div><span class="label">Date of birth * (18+)</span><div class="input"></div></div>
      <div><span class="label">Suburb</span><div class="input"></div></div>
      <div><span class="label">Instagram</span><div class="input"></div></div>
      <div><span class="label">TikTok</span><div class="input"></div></div>
      <div style="grid-column:1/3"><span class="label">Preferred venue</span><div class="input">Select a venue…</div></div>
    </div>
    <div style="margin-top:12px"><span class="label">Other venues you'd promote</span>
      <div class="theme-row"><span class="chip on">Eclipse</span><span class="chip">AfterDark</span><span class="chip">Su Casa</span><span class="chip">Pump</span></div></div>
    <div class="card" style="background:var(--surface);padding:14px;margin-top:14px">
      <b style="font-size:13px">Promoter agreement</b>
      ${['Follow Luna Group promoter guidelines.','Abusive behaviour may result in removal.','Only checked-in guests count toward rankings & rewards.','No fake or duplicate guests.','Consent to Luna Group contacting me.'].map(t=>`<div style="display:flex;gap:9px;margin-top:9px;font-size:12.5px"><span style="width:16px;height:16px;border:1px solid var(--gold);border-radius:4px;flex:none;background:rgba(212,175,55,.15)"></span>${t}</div>`).join('')}
    </div>
    <button class="btn btn-accent" style="width:100%;margin-top:14px">Submit application</button>
  </div>
</div>`,

success: () => `
<div class="frame-label">After submit · status set to Pending Approval, admin notified</div>
<div class="device"><div style="padding:6px 4px 20px;display:flex;justify-content:center">${logo}</div>
  <div class="card pad" style="text-align:center">
    <div style="width:60px;height:60px;border-radius:50%;background:rgba(212,175,55,.15);margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--gold)">✓</div>
    <h2 class="hd">Application received</h2>
    <p class="muted">Your application is <span class="accent">under review</span>. Our team will be in touch, and once approved you'll get your unique promoter link.</p>
    <button class="btn btn-ghost" style="width:100%;margin-top:16px">Back to home</button>
  </div></div>`,

register: () => `
<div class="frame-label">Guest registration · promoter.lunagroup.com.au/p/jackson23 · theme: ${VENUE}</div>
<div class="device">
  <div style="padding:6px 4px 14px"><span class="venue-logo accent">${VENUE.toUpperCase()}</span></div>
  <div style="text-align:center;padding:0 6px 14px">
    <span class="pill" style="background:color-mix(in srgb,var(--accent) 16%,transparent);color:var(--accent)">Guestlist</span>
    <h1 class="hd" style="margin-top:10px">You're on Jackson's list</h1>
    <p class="muted" style="font-size:13.5px">Register below to secure your spot. You'll get a QR code for the door.</p>
  </div>
  <div class="card pad">
    <span class="label">Choose your event *</span><div class="input">Saturdays at ${VENUE} — Sat 4 Jul</div>
    <div class="grid2" style="margin-top:12px">
      <div><span class="label">First name *</span><div class="input"></div></div>
      <div><span class="label">Last name *</span><div class="input"></div></div>
      <div style="grid-column:1/3"><span class="label">Mobile *</span><div class="input"></div></div>
      <div><span class="label">Email</span><div class="input"></div></div>
      <div><span class="label">Date of birth</span><div class="input"></div></div>
      <div style="grid-column:1/3"><span class="label">Instagram</span><div class="input"></div></div>
    </div>
    <div style="display:flex;gap:9px;margin-top:12px;font-size:12.5px" class="muted"><span style="width:16px;height:16px;border:1px solid var(--accent);border-radius:4px;flex:none"></span>Happy to receive Luna Group event updates.</div>
    <button class="btn btn-accent" style="width:100%;margin-top:14px">Get my QR code</button>
  </div>
</div>`,

qr: () => `
<div class="frame-label">Guest QR / confirmation · /g/{token} · theme: ${VENUE}</div>
<div class="device"><div style="padding:6px 4px 10px"><span class="venue-logo accent">${VENUE.toUpperCase()}</span></div>
  <div class="card pad" style="text-align:center">
    <span class="pill" style="background:rgba(45,180,120,.15);color:#37d39a">You're on the list</span>
    <h2 class="hd" style="margin-top:10px">Mia Thompson</h2>
    <p class="muted" style="margin:2px">Saturdays at ${VENUE} · ${VENUE}</p>
    <p class="muted" style="font-size:13px;margin:0 0 14px">Sat 4 Jul · 9:00pm</p>
    <div class="qr" style="margin:0 auto 14px">${QR}</div>
    <div><span class="muted" style="font-size:13px">Status </span><span class="pill" style="background:rgba(56,132,255,.15);color:#6ab0ff">registered</span></div>
    <p class="muted" style="font-size:11.5px;margin:10px 0 14px">Screenshot this QR and show it at the door. Guest of Jackson Reed.</p>
    <div class="grid2"><button class="btn btn-ghost">Add to calendar</button><button class="btn btn-ghost">Share with friends</button></div>
  </div></div>`,

login: () => `
<div class="frame-label">Login · staff & approved promoters</div>
<div class="device" style="max-width:380px"><div style="padding:10px 4px 22px;display:flex;justify-content:center">${logo}</div>
  <div class="card pad">
    <b style="font-size:18px">Staff & Promoter Login</b>
    <p class="muted" style="font-size:12.5px;margin:4px 0 16px">Admins, venue managers, reception and approved promoters.</p>
    <span class="label">Email</span><div class="input" style="margin-bottom:12px"></div>
    <span class="label">Password</span><div class="input" style="margin-bottom:16px"></div>
    <button class="btn btn-accent" style="width:100%">Sign in</button>
    <p class="muted" style="text-align:center;font-size:12.5px;margin-top:14px">Approved promoter? Create your login</p>
  </div></div>`,

reception: () => `
<div class="frame-label">Reception door check-in · optimised for iPad</div>
<div class="device ipad">
  <div style="display:flex;justify-content:space-between;align-items:center;padding:4px 6px 16px;border-bottom:1px solid var(--border);margin-bottom:16px">${logo}<span class="pill" style="background:rgba(212,175,55,.14);color:var(--gold)">Door Check-in</span></div>
  <div class="grid2" style="margin-bottom:14px">
    <div><span class="label">Venue</span><div class="input">${VENUE}</div></div>
    <div><span class="label">Event / date</span><div class="input">Saturdays at ${VENUE} — Sat 4 Jul</div></div>
  </div>
  <div class="grid3" style="margin-bottom:14px">
    <div class="stat"><div class="n">142</div><div class="l">Registered</div></div>
    <div class="stat"><div class="n" style="color:#37d39a">89</div><div class="l">Checked in</div></div>
    <div class="stat"><div class="n accent">53</div><div class="l">Remaining</div></div>
  </div>
  <div style="display:flex;gap:10px;margin-bottom:14px">
    <div class="input" style="flex:1;font-size:15px">Search name, phone, email or promoter…</div>
    <button class="btn btn-accent">Scan QR</button>
  </div>
  ${[['Mia Thompson','0412 555 018 · Jackson Reed (jackson23)','in'],
     ['Liam Carter','0433 118 902 · Sofia Ruiz (sofia88)','in'],
     ['Ava Nguyen','0401 776 231 · Jackson Reed (jackson23)','open'],
     ['Noah Patel','0455 908 112 · Marcus Lee (marcus41)','open']].map(([n,d,st])=>`
   <div class="card" style="padding:14px;display:flex;align-items:center;gap:12px;margin-bottom:8px;${st==='in'?'border-color:rgba(55,211,154,.4)':''}">
     <div style="flex:1"><div style="font-weight:700;font-size:16px">${n}</div><div class="muted" style="font-size:12.5px">${d}${st==='in'?' · <span style="color:#37d39a">in 9:42pm</span>':''}</div></div>
     ${st==='in'?'<span class="pill" style="background:rgba(55,211,154,.15);color:#37d39a">Checked in ✓</span>':
     '<span style="display:flex;gap:8px"><button class="btn" style="background:#e5484d;color:#fff;padding:9px 14px">No entry</button><button class="btn btn-accent" style="padding:9px 16px">Check in</button></span>'}
   </div>`).join('')}
</div>`,

promoter: () => `
<div class="frame-label">Promoter dashboard</div>
<div class="device wide">
  <div style="display:flex;justify-content:space-between;align-items:center;padding:4px 6px 16px;border-bottom:1px solid var(--border);margin-bottom:18px">${logo}<span class="muted" style="font-size:13px">Dashboard · Sign out</span></div>
  <h1 class="hd">Welcome, Jackson</h1>

function adminHeader(active, vm){
  const items = vm ? ['Overview','Events','Leaderboards','Exports'] : ['Overview','Promoters','Events','Venues','Leaderboards','Tiers','Exports'];
  return `<div style="display:flex;align-items:center;gap:14px;padding:4px 6px 16px;border-bottom:1px solid var(--border);margin-bottom:18px">${logo}
    <div style="display:flex;gap:4px;flex-wrap:wrap;margin-left:8px">${items.map(i=>`<span class="navbtn ${i===active?'active':''}" style="display:inline-block;width:auto;padding:6px 11px">${i}</span>`).join('')}</div>
    <span class="muted" style="margin-left:auto;font-size:13px">Sign out</span></div>`;
}
function statusStyle(s){return {pending:'background:rgba(245,180,60,.15);color:#f5b43c',approved:'background:rgba(55,211,154,.15);color:#37d39a',suspended:'background:rgba(140,140,150,.2);color:#bbb',rejected:'background:rgba(229,72,77,.15);color:#e5484d'}[s]||''}
function tierStyle(t){return {Bronze:'background:rgba(205,127,50,.15);color:#cd7f32',Silver:'background:rgba(192,192,192,.15);color:#c0c0c0',Gold:'background:rgba(212,175,55,.15);color:#d4af37',Elite:'background:rgba(178,141,255,.15);color:#b28dff'}[t]||''}

const stage = document.getElementById('stage');
function render(name){ stage.innerHTML = screens[name](); }
document.querySelectorAll('.navbtn[data-s]').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.navbtn[data-s]').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); render(b.dataset.s); window.scrollTo(0,0);
});
document.querySelectorAll('#themes .chip').forEach(c=>c.onclick=()=>{
  document.querySelectorAll('#themes .chip').forEach(x=>x.classList.remove('on'));
  c.classList.add('on');
  document.documentElement.style.setProperty('--accent',c.dataset.a);
  document.documentElement.style.setProperty('--accent2',c.dataset.b);
  VENUE=c.dataset.v;
  const cur=document.querySelector('.navbtn[data-s].active').dataset.s; render(cur);
});
render('signup');
